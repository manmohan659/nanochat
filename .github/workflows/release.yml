name: Semantic Release

on:
  push:
    branches: [master, main, rc]
  workflow_dispatch:

concurrency:
  group: semantic-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Create release tag from Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN || secrets.INFRA_REPO_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Require cascading release token
        env:
          RELEASE_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN || secrets.INFRA_REPO_PAT }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "Set SEMANTIC_RELEASE_TOKEN or INFRA_REPO_PAT to a GitHub PAT so release tags trigger the prod deployment workflow." >&2
            exit 1
          fi

      - name: Install semantic-release
        run: |
          npm install --global semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/npm

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN || secrets.INFRA_REPO_PAT }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: semantic-release
