name: Release to Prod (Blue/Green)

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
  PROD_CLUSTER: samosachaat-prod-eks
  PROD_NAMESPACE: samosachaat-prod
  SERVICES: frontend auth chat-api inference

jobs:
  release:
    name: Blue/Green release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Promote uat images to prod tag
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          DST_REF: prod-${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          for svc in $SERVICES; do
            repo="samosachaat/${svc}"
            src=$(aws ecr describe-images \
              --repository-name "$repo" \
              --query 'sort_by(imageDetails[?imageTags!=`null`],&imagePushedAt)[].imageTags[]' \
              --output text | tr '\t' '\n' | grep '^uat-' | tail -1 || true)
            if [ -z "$src" ] || [ "$src" = "None" ]; then
              echo "No uat-* image found for $repo" >&2
              exit 1
            fi
            echo "Promoting $repo:$src -> $repo:$DST_REF"
            manifest=$(aws ecr batch-get-image \
              --repository-name "$repo" \
              --image-ids imageTag="$src" \
              --query 'images[0].imageManifest' \
              --output text)
            aws ecr put-image \
              --repository-name "$repo" \
              --image-tag "$DST_REF" \
              --image-manifest "$manifest" >/dev/null
          done

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "$PROD_CLUSTER" \
            --region "$AWS_REGION"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.2'

      - name: Select candidate slot
        id: slot
        run: |
          set -euo pipefail
          current=$(helm get values samosachaat-traffic -n "$PROD_NAMESPACE" -o json 2>/dev/null \
            | jq -r '.ingress.targetSlot // "blue"' || echo "blue")
          if [ "$current" = "green" ]; then
            candidate="blue"
          else
            candidate="green"
          fi
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "candidate=$candidate" >> "$GITHUB_OUTPUT"

      - name: Verify traffic release exists
        run: |
          helm status samosachaat-traffic -n "$PROD_NAMESPACE" >/dev/null

      - name: Deploy candidate slot
        run: |
          helm upgrade --install samosachaat-${{ steps.slot.outputs.candidate }} helm/samosachaat \
            -f helm/samosachaat/values-prod.yaml \
            --set global.imageTag=prod-${{ steps.tag.outputs.name }} \
            --set deployment.slot=${{ steps.slot.outputs.candidate }} \
            --set ingress.enabled=false \
            --set namespace.create=false \
            --set configMap.create=false \
            --set secrets.create=false \
            --namespace "$PROD_NAMESPACE" \
            --create-namespace \
            --wait --timeout 15m

      - name: Smoke test candidate
        run: |
          set -euo pipefail
          candidate=${{ steps.slot.outputs.candidate }}
          kubectl -n "$PROD_NAMESPACE" rollout status deploy/frontend-${candidate} --timeout=5m
          kubectl -n "$PROD_NAMESPACE" run smoke-${{ github.run_id }} \
            --rm -i --restart=Never \
            --image=curlimages/curl:8.10.1 \
            --command -- curl -fsS --max-time 10 \
            http://frontend-${candidate}.${PROD_NAMESPACE}.svc.cluster.local:3000/api/health

      - name: Swap ingress to candidate
        run: |
          helm upgrade samosachaat-traffic helm/samosachaat \
            --reuse-values \
            --set ingress.targetSlot=${{ steps.slot.outputs.candidate }} \
            --namespace "$PROD_NAMESPACE" \
            --wait --timeout 10m

      - name: Retain previous slot as rollback standby
        run: |
          echo "Active slot: ${{ steps.slot.outputs.candidate }}"
          echo "Rollback slot: ${{ steps.slot.outputs.current }}"
          echo "To roll back:"
          echo "  helm upgrade samosachaat-traffic helm/samosachaat \\"
          echo "    --reuse-values \\"
          echo "    --set ingress.targetSlot=${{ steps.slot.outputs.current }} \\"
          echo "    --namespace $PROD_NAMESPACE"
