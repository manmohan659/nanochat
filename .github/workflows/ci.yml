name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      auth: ${{ steps.filter.outputs.auth }}
      chat-api: ${{ steps.filter.outputs.chat-api }}
      inference: ${{ steps.filter.outputs.inference }}
      db: ${{ steps.filter.outputs.db }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'services/frontend/**'
            auth:
              - 'services/auth/**'
            chat-api:
              - 'services/chat-api/**'
              - 'db/**'
            inference:
              - 'services/inference/**'
            db:
              - 'db/**'
            terraform:
              - 'terraform/**'

  commitlint:
    name: PR commits — conventional commit lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Validate PR commit messages
        run: |
          npx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --verbose

  test-frontend:
    name: Frontend — lint/type-check/test
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test --if-present

  test-auth:
    name: Auth — pytest
    needs: changes
    if: needs.changes.outputs.auth == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync deps
        run: uv sync --no-install-workspace

      - name: Run pytest
        run: uv run pytest

  test-chat-api:
    name: Chat-API — pytest (postgres service)
    needs: changes
    if: needs.changes.outputs.chat-api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/chat-api
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: samosachaat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/samosachaat_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync deps
        run: uv sync --no-install-workspace

      - name: Run pytest
        run: uv run pytest

  test-inference:
    name: Inference — pytest
    needs: changes
    if: needs.changes.outputs.inference == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/inference
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync deps
        run: uv sync --no-install-workspace

      - name: Run pytest
        run: uv run pytest

  terraform-validate:
    name: Terraform — validate
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: |
          for dir in bootstrap environments/dev environments/uat environments/prod; do
            terraform -chdir="$dir" init -backend=false
          done

      - name: Terraform validate
        run: |
          for dir in bootstrap environments/dev environments/uat environments/prod; do
            terraform -chdir="$dir" validate
          done

  docker-build:
    name: Docker build — ${{ matrix.service }}
    needs: changes
    if: >
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.auth == 'true' ||
      needs.changes.outputs.chat-api == 'true' ||
      needs.changes.outputs.inference == 'true' ||
      needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: services/frontend
            dockerfile: services/frontend/Dockerfile
          - service: auth
            context: services/auth
            dockerfile: services/auth/Dockerfile
          - service: chat-api
            context: .
            dockerfile: services/chat-api/Dockerfile
          - service: inference
            context: services/inference
            dockerfile: services/inference/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: samosachaat/${{ matrix.service }}:ci
          cache-from: type=gha,scope=ci-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.service }}
