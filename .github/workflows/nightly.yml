name: Nightly QA Build

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-qa
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
  QA_CLUSTER: ${{ vars.QA_CLUSTER || 'samosachaat-dev-eks' }}
  QA_NAMESPACE: samosachaat-qa
  IMAGE_TAG: qa-${{ github.sha }}

jobs:
  build:
    name: Build QA ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: services/frontend
            dockerfile: services/frontend/Dockerfile
          - service: auth
            context: services/auth
            dockerfile: services/auth/Dockerfile
          - service: chat-api
            context: .
            dockerfile: services/chat-api/Dockerfile
          - service: inference
            context: services/inference
            dockerfile: services/inference/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push QA image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/samosachaat/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ steps.ecr-login.outputs.registry }}/samosachaat/${{ matrix.service }}:qa-latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-qa:
    name: Deploy QA namespace
    runs-on: ubuntu-latest
    needs: build
    environment: qa
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "$QA_CLUSTER" \
            --region "$AWS_REGION"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.2'

      - name: Helm upgrade QA
        run: |
          helm upgrade --install samosachaat helm/samosachaat \
            -f helm/samosachaat/values-qa.yaml \
            --set global.imageRegistry="${{ steps.ecr-login.outputs.registry }}" \
            --set global.imageTag="${IMAGE_TAG}" \
            --set secrets.create=false \
            --namespace "$QA_NAMESPACE" \
            --create-namespace \
            --wait --timeout 10m

      - name: Smoke test QA
        run: ./scripts/smoke-test-k8s.sh "$QA_NAMESPACE"
