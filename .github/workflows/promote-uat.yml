name: Promote to UAT

on:
  push:
    tags:
      - 'RC*'
  workflow_run:
    workflows: ["Build & Push Dev Images"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:
    inputs:
      source_tag:
        description: ECR image tag to promote, for example qa-latest or dev-<sha>
        required: false
        type: string
      promotion_name:
        description: UAT tag suffix, for example RC1 or PR68-abcdef1
        required: false
        type: string

concurrency:
  group: promote-uat
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
  UAT_CLUSTER: samosachaat-uat-eks
  UAT_NAMESPACE: samosachaat-uat
  SERVICES: frontend auth chat-api inference

jobs:
  promote:
    name: Re-tag tested image → UAT and deploy
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        env:
          INPUT_SOURCE_TAG: ${{ github.event.inputs.source_tag || '' }}
          INPUT_PROMOTION_NAME: ${{ github.event.inputs.promotion_name || '' }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            head_sha="${{ github.event.workflow_run.head_sha }}"
            short_sha="$(printf '%s' "$head_sha" | cut -c1-7)"
            echo "source=dev-${head_sha}" >> "$GITHUB_OUTPUT"
            echo "name=merge-${short_sha}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            echo "source=qa-latest" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            short_sha="$(git rev-parse --short HEAD)"
            echo "source=${INPUT_SOURCE_TAG:-qa-latest}" >> "$GITHUB_OUTPUT"
            echo "name=${INPUT_PROMOTION_NAME:-manual-${short_sha}}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Re-tag source images as uat-${{ steps.tag.outputs.name }}
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SRC_REF: ${{ steps.tag.outputs.source }}
          DST_REF: uat-${{ steps.tag.outputs.name }}
        run: |
          set -euo pipefail
          for svc in $SERVICES; do
            repo="samosachaat/${svc}"
            echo "Re-tagging $repo:$SRC_REF -> $repo:$DST_REF"
            manifest=$(aws ecr batch-get-image \
              --repository-name "$repo" \
              --image-ids imageTag="$SRC_REF" \
              --query 'images[0].imageManifest' \
              --output text)
            if [ -z "$manifest" ] || [ "$manifest" = "None" ]; then
              echo "Missing source image $repo:$SRC_REF" >&2
              exit 1
            fi
            aws ecr put-image \
              --repository-name "$repo" \
              --image-tag "$DST_REF" \
              --image-manifest "$manifest" >/dev/null
          done

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "$UAT_CLUSTER" \
            --region "$AWS_REGION"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.2'

      - name: Helm upgrade (UAT)
        run: |
          helm upgrade --install samosachaat helm/samosachaat \
            -f helm/samosachaat/values-uat.yaml \
            --set global.imageRegistry="${{ steps.ecr-login.outputs.registry }}" \
            --set global.imageTag=uat-${{ steps.tag.outputs.name }} \
            --set secrets.create=false \
            --namespace "$UAT_NAMESPACE" \
            --create-namespace \
            --wait --timeout 10m

      - name: Smoke test UAT
        run: ./scripts/smoke-test-k8s.sh "$UAT_NAMESPACE"
