{{- if .Values.ingress.enabled -}}
{{- $targetSlot := default .Values.deployment.slot .Values.ingress.targetSlot -}}
{{- $frontendSvc := include "samosachaat.svcNameForSlot" (dict "svc" "frontend" "slot" $targetSlot) -}}
{{- $authSvc := include "samosachaat.svcNameForSlot" (dict "svc" "auth" "slot" $targetSlot) -}}
{{- $chatApiSvc := include "samosachaat.svcNameForSlot" (dict "svc" "chat-api" "slot" $targetSlot) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: samosachaat
  namespace: {{ include "samosachaat.namespace" . }}
  labels:
    {{- include "samosachaat.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=120
    alb.ingress.kubernetes.io/target-group-attributes: deregistration_delay.timeout_seconds=30
    {{- with .Values.ingress.acmCertArn }}
    alb.ingress.kubernetes.io/certificate-arn: {{ . | quote }}
    {{- end }}
spec:
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: {{ $authSvc }}
                port:
                  number: {{ .Values.auth.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $chatApiSvc }}
                port:
                  number: {{ .Values.chatApi.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $frontendSvc }}
                port:
                  number: {{ .Values.frontend.port }}
    - host: {{ .Values.ingress.grafanaHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.grafanaServiceName }}
                port:
                  number: {{ .Values.ingress.grafanaServicePort }}
{{- end }}
