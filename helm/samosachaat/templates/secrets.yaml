{{- if .Values.secrets.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: samosachaat-secrets
  namespace: {{ include "samosachaat.namespace" . }}
  labels:
    {{- include "samosachaat.labels" . | nindent 4 }}
type: Opaque
{{- with .Values.secrets.data }}
stringData:
  {{- range $k, $v := . }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end }}
